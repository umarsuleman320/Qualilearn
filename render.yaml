services:
  - type: web
    name: qualilearn
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn qualilearn_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qualilearn_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: qualilearn_db
    plan: free
