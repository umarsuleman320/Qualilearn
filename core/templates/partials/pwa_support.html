<!-- PWA Support -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icons/icon-512.png">

<!-- PWA Install Banner -->
<div id="pwaInstallBanner" class="fixed-bottom p-3 shadow-lg border-top d-none animate-slide-up" style="z-index: 9999; background: var(--bs-body-bg); border-radius: 1.5rem 1.5rem 0 0;">
    <div class="container d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3">
            <img src="/static/icons/icon-512.png" style="width: 52px; height: 52px; border-radius: 14px; box-shadow: 0 4px 12px rgba(99,102,241,0.2);">
            <div>
                <h6 class="mb-0 fw-bold">Install QualiLearn</h6>
                <small class="text-muted">Use it like a real mobile app!</small>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-light rounded-pill px-3" onclick="dismissPWA()">Later</button>
            <button class="btn btn-sm btn-primary rounded-pill px-4" onclick="installPWA()">Install</button>
        </div>
    </div>
</div>

<style>
    .animate-slide-up {
        animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
</style>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/static/service-worker.js')
                .then(reg => console.log('PWA Ready'))
                .catch(err => console.log('PWA Fail', err));
        });
    }

    let deferredPrompt;
    const banner = document.getElementById('pwaInstallBanner');

    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        deferredPrompt = e;
        
        // Only show if not dismissed in the last 24 hours
        const lastDismissed = localStorage.getItem('pwaDismissedAt');
        const now = new Date().getTime();
        
        if (!lastDismissed || (now - lastDismissed > 24 * 60 * 60 * 1000)) {
            // Delay slightly to not annoy the user immediately
            setTimeout(() => {
                banner.classList.remove('d-none');
            }, 2000);
        }
    });

    window.addEventListener('appinstalled', (evt) => {
        banner.classList.add('d-none');
        console.log('QualiLearn was installed');
    });

    function installPWA() {
        if (!deferredPrompt) return;
        
        banner.classList.add('d-none');
        deferredPrompt.prompt();
        
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the install prompt');
            }
            deferredPrompt = null;
        });
    }

    function dismissPWA() {
        banner.classList.add('d-none');
        // Record dismissal time
        localStorage.setItem('pwaDismissedAt', new Date().getTime());
    }
</script>
