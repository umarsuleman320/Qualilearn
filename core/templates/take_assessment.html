<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Assessment • QualiLearn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card-bg: white;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .question-card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .option-label {
            padding: 1.25rem 1.5rem;
            border: 2px solid var(--border);
            border-radius: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-label:hover {
            border-color: var(--primary);
            background: rgba(99,102,241,0.05);
        }

        .option-input:checked + .option-label {
            border-color: var(--primary);
            background: rgba(99,102,241,0.1);
            font-weight: 600;
        }

        .timer-sticky {
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .timer-box {
            background: white;
            border-radius: 1rem;
            padding: 1rem 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 1rem;
            padding: 1rem 3rem;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            color: white;
        }
    </style>
</head>

<body class="py-5">

    <div class="container">
        <div class="row">
            <!-- Sidebar for Timer and Nav -->
            <div class="col-lg-3 d-none d-lg-block">
                <div class="timer-sticky">
                    <div class="timer-box mb-4">
                        <i class="bi bi-clock-history"></i>
                        <span id="timerDisplay">--:--</span>
                    </div>
                    <div class="card border-0 shadow-sm p-3 rounded-4">
                        <h6>Questions</h6>
                        <div class="d-flex flex-wrap gap-2 mt-2">
                            {% for q in questions %}
                            <div id="nav_q_{{ forloop.counter }}" class="rounded-circle d-flex align-items-center justify-content-center bg-light text-muted fw-bold" style="width:35px;height:35px;font-size:0.8rem; border: 1px solid #e2e8f0;">
                                {{ forloop.counter }}
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quiz Content -->
            <div class="col-lg-9">
                <form method="POST" id="assessmentForm" action="{% url 'submit_assessment' %}">
                    {% csrf_token %}
                    
                    {% for q in questions %}
                    <div class="card question-card">
                        <div class="card-header bg-white border-0 pt-4 px-4 px-md-5">
                            <span class="badge bg-primary-subtle text-primary px-3 py-2 mb-3">Question {{ forloop.counter }} of {{ questions|length }}</span>
                            <h4 class="mb-0 fw-bold">{{ q.text }}</h4>
                        </div>
                        <div class="card-body p-4 p-md-5 pt-3">
                            <div class="options-container">
                                {% for option in q.options %}
                                <input type="radio" 
                                       name="q_{{ q.id }}" 
                                       id="option_{{ q.id }}_{{ forloop.counter0 }}" 
                                       class="option-input d-none" 
                                       value="{{ forloop.counter0 }}"
                                       onchange="markAnswered({{ forloop.counter }})">
                                <label for="option_{{ q.id }}_{{ forloop.counter0 }}" class="option-label">
                                    <span class="rounded-circle border d-flex align-items-center justify-content-center bg-white fw-bold" style="width:30px;height:30px;font-size:0.8rem;">
                                        {% if forloop.counter == 1 %}A{% elif forloop.counter == 2 %}B{% elif forloop.counter == 3 %}C{% else %}D{% endif %}
                                    </span>
                                    {{ option }}
                                </label>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                    {% endfor %}

                    <div class="text-center mt-5 mb-5">
                        <button type="submit" class="btn btn-submit shadow-lg" id="submitBtn">
                            Submit Final Answers <i class="bi bi-send-fill ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Mobile Timer -->
    <div class="d-lg-none fixed-bottom p-3 text-center">
        <div class="timer-box border bg-white shadow-lg">
            <i class="bi bi-clock-history"></i>
            <span id="mobileTimerDisplay">--:--</span>
        </div>
    </div>

    <script>
        // Use the dynamic time limit passed from Django session
        let timeLeft = {{ time_limit|default:900 }};
        const displays = [document.getElementById('timerDisplay'), document.getElementById('mobileTimerDisplay')];

        function updateTimer() {
            if (timeLeft <= 0) {
                document.getElementById('assessmentForm').submit();
                return;
            }
            
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const text = `${m}:${s.toString().padStart(2, '0')}`;
            
            displays.forEach(d => {
                if(d) d.textContent = text;
            });

            if (timeLeft <= 60) {
                displays.forEach(d => { if(d) d.parentElement.style.color = 'red'; });
            }

            timeLeft--;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function markAnswered(num) {
            const el = document.getElementById('nav_q_' + num);
            if (el) {
                el.classList.remove('bg-light', 'text-muted');
                el.classList.add('bg-primary', 'text-white');
                el.style.borderColor = 'var(--primary)';
            }
        }

        document.getElementById('assessmentForm').onsubmit = function() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Submitting...';
        };
    </script>
{% include 'partials/translations.html' %}
</body>
</html>
