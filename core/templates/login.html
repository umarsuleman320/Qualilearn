<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • QualiLearn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .auth-card {
            max-width: 460px;
            width: 100%;
            border-radius: 1.5rem;
            box-shadow: 0 15px 50px rgba(99,102,241,0.18);
            overflow: hidden;
        }
        .auth-header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-card bg-white">
        <div class="auth-header">
            <i class="bi bi-rocket-takeoff-fill fs-1 mb-3"></i>
            <h2 class="fw-bold mb-1">Welcome Back</h2>
            <p class="mb-0 opacity-90">Sign in to continue your learning journey</p>
        </div>

        <div class="p-5">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-medium">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
                </button>

                <div class="text-center">
                    <p class="mb-0">Don't have an account? 
                        <a href="{% url 'register' %}" class="text-primary fw-medium">Create Free Account</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
