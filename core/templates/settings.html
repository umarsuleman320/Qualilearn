<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Settings - QualiLearn">

    <title>Settings • QualiLearn</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --light-bg: #f8fafc;
            --card-bg: white;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--light-bg);
            color: var(--text);
            min-height: 100vh;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid var(--border);
        }

        .settings-card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 0.75rem;
            padding: 0.7rem 1.6rem;
            font-weight: 600;
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand fw-bold fs-4" href="{% url 'dashboard' %}">QualiLearn</a>
            <div class="ms-auto dropdown">
                <button class="btn btn-link p-0" type="button" data-bs-toggle="dropdown">
                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold" style="width:40px;height:40px;">
                        {{ request.user.username|slice:":1"|upper }}
                    </div>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li><a class="dropdown-item" href="{% url 'profile' %}">Profile</a></li>
                    <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 px-3 px-md-4">
        <div class="mb-5 fade-in-up">
            <h1 class="fw-bold">Settings</h1>
            <p class="text-muted">Manage your account information and preferences</p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-lg-8">
                <!-- Profile Settings -->
                <div class="card settings-card p-4 p-md-5 mb-4 fade-in-up">
                    <h4 class="fw-bold mb-4 border-bottom pb-3"><i class="bi bi-person me-2"></i> Profile Information</h4>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-muted text-uppercase">First Name</label>
                                <input type="text" name="first_name" class="form-control form-control-lg" value="{{ request.user.first_name }}" placeholder="First Name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-muted text-uppercase">Last Name</label>
                                <input type="text" name="last_name" class="form-control form-control-lg" value="{{ request.user.last_name }}" placeholder="Last Name">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-lg" value="{{ request.user.email }}" placeholder="Email">
                        </div>
                        <button type="submit" name="update_profile" class="btn btn-primary btn-lg shadow-sm">Save Changes</button>
                    </form>
                </div>

                <!-- Password Settings -->
                <div class="card settings-card p-4 p-md-5 fade-in-up" style="animation-delay: 0.1s;">
                    <h4 class="fw-bold mb-4 border-bottom pb-3"><i class="bi bi-shield-lock me-2"></i> Password & Security</h4>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Current Password</label>
                            <input type="password" name="current_password" class="form-control form-control-lg" placeholder="••••••••" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">New Password</label>
                                <input type="password" name="new_password" class="form-control form-control-lg" placeholder="New Password" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Confirm Password</label>
                                <input type="password" name="confirm_password" class="form-control form-control-lg" placeholder="Confirm" required>
                            </div>
                        </div>
                        <button type="submit" name="update_password" class="btn btn-outline-primary btn-lg">Update Password</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-auto py-4 text-center small bg-dark text-white-50">
        <div class="container">
            <p class="mb-0">© 2026 QualiLearn • Zaria, Kaduna State, Nigeria</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% include 'partials/translations.html' %}
</body>
</html>
