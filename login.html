<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your QualiLearn account and start learning today">

    <title>Create Account - QualiLearn</title>

    <!-- Bootstrap 5.3 + Icons + Fonts (same as login) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Reuse same root variables & body styles as login.html */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --light-bg: #f8fafc;
            --card-bg: white;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-card {
            max-width: 460px;
            width: 100%;
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 40px rgba(99,102,241,0.12);
            overflow: hidden;
            animation: fadeInScale 0.7s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .form-control, .form-select {
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            border: 1px solid #cbd5e1;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(99,102,241,0.15);
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .link-primary {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .link-primary:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="auth-card bg-white">

        <div class="auth-header">
            <i class="bi bi-rocket-takeoff-fill fs-1 mb-3 d-block"></i>
            <h2 class="fw-bold mb-1">Join QualiLearn</h2>
            <p class="mb-0 opacity-90">Start your free learning journey today</p>
        </div>

        <div class="card-body p-4 p-md-5">

            <form>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="firstname" class="form-label fw-medium">First Name</label>
                        <input type="text" class="form-control form-control-lg" id="firstname" placeholder="Umar" required>
                    </div>
                    <div class="col-md-6">
                        <label for="lastname" class="form-label fw-medium">Last Name</label>
                        <input type="text" class="form-control form-control-lg" id="lastname" placeholder="Abdullahi" required>
                    </div>
                </div>

                <div class="mb-4 mt-4">
                    <label for="email" class="form-label fw-medium">Email Address</label>
                    <input type="email" class="form-control form-control-lg" id="email" placeholder="you@example.com" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-medium">Create Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" placeholder="At least 8 characters" required>
                </div>

                <div class="mb-4">
                    <label for="education-level" class="form-label fw-medium">Education Level</label>
                    <select class="form-select form-select-lg" id="education-level" required>
                        <option value="" disabled selected>Select your level</option>
                        <option>Primary</option>
                        <option>Junior Secondary</option>
                        <option>Senior Secondary</option>
                        <option>University / Polytechnic</option>
                        <option>Vocational / Skill Learner</option>
                    </select>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small" for="terms">
                        I agree to the <a href="#" class="link-primary">Terms of Service</a> and <a href="#" class="link-primary">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">
                    Create Free Account
                </button>

                <div class="text-center small text-muted">
                    Already have an account? 
                    <a href="login.html" class="link-primary fw-medium">Sign in</a>
                </div>

            </form>

        </div>

        <div class="text-center py-4 bg-light small text-muted border-top">
            © 2026 QualiLearn • All rights reserved
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
